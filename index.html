<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Key Generated | Sabbir Modz</title>

<style>
:root {
    --bg: #050607;
    --card: #0f1412;
    --text: #e6fff3;
    --accent: #00ff88;
    --accent-glow: rgba(0, 255, 136, 0.25);
    --error: #ff3b3b;
}

body {
    background: radial-gradient(circle at top, #0a1a14, #050607);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
}

.container {
    width: 100%;
    max-width: 420px;
    text-align: center;
}

/* ICON */
.key-icon {
    width: 90px;
    height: 90px;
    margin: -45px auto 15px;
    border-radius: 50%;
    border: 2px solid rgba(0,255,136,0.3);
    background: rgba(0,0,0,0.6);
    box-shadow: 0 0 25px rgba(0,255,136,0.15);
    overflow: hidden;
}

.key-icon img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* CARD */
.card {
    background: linear-gradient(145deg, #0f1412, #0b0f0d);
    border: 1px solid rgba(0,255,136,0.15);
    border-radius: 28px;
    padding: 40px 25px;
    box-shadow: 0 0 45px rgba(0,255,136,0.08);
    animation: glowPulse 3s infinite ease-in-out;
}

@keyframes glowPulse {
    0% { box-shadow: 0 0 15px rgba(0,255,136,0.08); }
    50% { box-shadow: 0 0 35px rgba(0,255,136,0.20); }
    100% { box-shadow: 0 0 15px rgba(0,255,136,0.08); }
}

/* TEXT */
h1 {
    font-size: 26px;
    margin-bottom: 5px;
}

h2 {
    color: var(--accent);
    font-size: 20px;
}

.subtitle {
    color: #888;
    font-size: 13px;
    margin-bottom: 20px;
}

/* KEY BOX */
.key-box {
    background: rgba(0,0,0,0.6);
    padding: 18px;
    border-radius: 16px;
    border: 1px solid var(--accent);
    box-shadow: 0 0 20px rgba(0,255,136,0.15);
    margin: 20px 0;
}

#finalKey {
    color: var(--accent);
    font-family: monospace;
    font-size: 18px;
    letter-spacing: 2px;
}

/* BUTTON */
.btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 14px;
    font-weight: bold;
    cursor: pointer;
    background: linear-gradient(90deg, #00ff88, #00c86a);
    color: #000;
    box-shadow: 0 0 20px var(--accent-glow);
    transition: 0.3s ease;
}

.btn:hover {
    transform: scale(1.04);
    box-shadow: 0 0 35px rgba(0,255,136,0.4);
}

/* ERROR */
.error-card {
    background: #120707;
    border: 1px solid #3a0f0f;
    border-radius: 24px;
    padding: 40px;
}

.error-title {
    color: var(--error);
    font-size: 22px;
    font-weight: bold;
}

/* FOOTER */
.footer {
    margin-top: 40px;
    font-size: 10px;
    color: #333;
    letter-spacing: 2px;
}
</style>
</head>

<body>

<div class="container">

    <div id="mainContainer">

        <div class="key-icon">
            <img src="./assets/logo.png" alt="logo">
        </div>

        <h1>Access Unlocked</h1>
        <p class="subtitle">Your secure license key is ready</p>

        <div class="card">

            <h2>Generation Success</h2>

            <div class="key-box">
                <span id="finalKey">GENERATING...</span>
            </div>

            <button class="btn" id="copyBtn" onclick="copyKey()">
                COPY KEY
            </button>

        </div>
    </div>

    <div id="bypassContainer" style="display:none;">
        <div class="error-card">
            <div class="error-title">Bypass Detected 🚫</div>
            <p style="color:#888;font-size:13px;">
                Direct access not allowed. Please use official link.
            </p>
        </div>
    </div>

    <div class="footer">SABBIR MODZ SYSTEM</div>
</div>

<script>
async function generateKey() {
    try {
        const res = await fetch('https://api.ipify.org?format=json');
        const data = await res.json();
        const ip = data.ip;

        const day = Math.floor(Date.now() / 86400000);
        const seed = parseInt(ip.replace(/\./g,'').slice(0,6)) + day;

        function rnd() {
            let x = Math.sin(seed++) * 10000;
            return x - Math.floor(x);
        }

        const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
        let key = "UKM-";

        for (let i = 0; i < 4; i++) {
            let part = "";
            for (let j = 0; j < 4; j++) {
                part += chars[Math.floor(rnd() * chars.length)];
            }
            key += part + (i < 3 ? "-" : "");
        }

        document.getElementById("finalKey").innerText = key;

    } catch (e) {
        document.getElementById("finalKey").innerText = "NO INTERNET";
    }
}

function copyKey() {
    const text = document.getElementById("finalKey").innerText;
    navigator.clipboard.writeText(text);

    const btn = document.getElementById("copyBtn");
    btn.innerText = "COPIED ✔";
    setTimeout(() => btn.innerText = "COPY KEY", 2000);
}

function check() {
    const ok = location.search.includes("official");
    if (!ok) {
        document.getElementById("mainContainer").style.display = "none";
        document.getElementById("b            document.getElementById('mainContainer').style.display = "block";
            generateLockedKey(); 
        } else {
            document.getElementById('mainContainer').style.display = "none";
            document.getElementById('bypassContainer').style.display = "block";
            document.getElementById('finalKey').innerText = "ACCESS DENIED";
        }
    }

    async function generateLockedKey() {
    try {
        const response = await fetch('https://api.ipify.org?format=json');
        const data = await response.json();
        const ip = data.ip;

        // Aaj ki Date (Daily expiry ke liye)
        const day = Math.floor(Date.now() / 86400000);
        const ipSeed = parseInt(ip.replace(/\./g, '').substring(0, 6)); 
        
        // Seed: IP + Date + Year (Ye App se match hona chahiye)
        let seed = ipSeed + day + 2026; 
        
        function rnd() { 
            var x = Math.sin(seed++) * 10000; 
            return Math.abs(x - Math.floor(x)); 
        }
        
        const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
        let segments = [];
        for(let i=0; i<4; i++) {
            let s = "";
            for(let j=0; j<4; j++) {
                let r = Math.floor(rnd() * chars.length);
                s += chars.charAt(r);
            }
            segments.push(s);
        }

        const finalKey = "UKM-" + segments.join("-");
        document.getElementById('finalKey').innerText = finalKey;

    } catch (err) {
        document.getElementById('finalKey').innerText = "CONNECT TO INTERNET";
    }
}



    function copyKey() {
        const keyText = document.getElementById('finalKey').innerText;
        if(keyText.includes("SECURE") || keyText.includes("CONNECT")) return;

        navigator.clipboard.writeText(keyText).then(() => {
            const btn = document.getElementById('copyBtn');
            btn.innerText = "COPIED SUCCESSFULLY! ✅";
            btn.style.background = "#00ff88";
            setTimeout(() => { 
                btn.innerText = "COPY TO CLIPBOARD"; 
                btn.style.background = "#ffffff";
            }, 2000);
        });
    }

    window.onload = checkSecurity;
</script>
</body>
</html>
