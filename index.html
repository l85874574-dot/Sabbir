<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Key System | Sabbir Modz</title>

<style>
:root{
  --bg:#07070a;
  --card:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.12);
  --text:#fff;
  --accent:#00ff9d;
  --danger:#ff3b3b;
}

body{
  margin:0;
  font-family:system-ui;
  background: radial-gradient(circle at top,#111,#050507);
  color:var(--text);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}

.container{max-width:420px;width:100%;text-align:center}

.card{
  background:var(--card);
  backdrop-filter: blur(18px);
  border:1px solid var(--border);
  border-radius:24px;
  padding:30px;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

.logo{
  width:80px;height:80px;
  border-radius:50%;
  margin:-60px auto 10px;
  overflow:hidden;
  border:2px solid var(--accent);
}

.logo img{width:100%;height:100%;object-fit:cover}

h1{font-size:24px;margin:10px 0}
.sub{color:#aaa;font-size:13px;margin-bottom:20px}

.key-box{
  background:rgba(0,0,0,0.5);
  border:1px dashed var(--accent);
  padding:18px;
  border-radius:14px;
  font-family:monospace;
  letter-spacing:2px;
  color:var(--accent);
  font-weight:bold;
  margin:20px 0;
}

.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  font-weight:700;
  cursor:pointer;
  transition:.3s;
}

.btn-primary{
  background:#fff;
  color:#000;
}

.btn-primary:hover{
  background:var(--accent);
  transform:scale(1.03);
}

.btn-danger{
  background:var(--danger);
  color:#fff;
  margin-top:12px;
}

.footer{
  margin-top:25px;
  font-size:10px;
  color:#444;
  letter-spacing:2px;
}
.hidden{display:none}

.loading{
  color:#888;
  font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<!-- MAIN -->
<div id="main" class="card hidden">

<div class="logo">
<img src="./assets/logo.png">
</div>

<h1>Premium Access Granted</h1>
<div class="sub">Device locked secure key system</div>

<div class="key-box" id="key">GENERATING...</div>

<button class="btn btn-primary" onclick="copyKey()" id="copyBtn">
Copy Key
</button>

</div>

<!-- BLOCK -->
<div id="block" class="card hidden">
<h2 style="color:var(--danger)">Access Blocked</h2>
<p style="color:#aaa;font-size:13px">
Direct access is not allowed. Please use official system.
</p>
<button class="btn btn-danger" onclick="location.href='steps.html'">
Return
</button>
</div>

<div class="footer">SABBIR MODZ • PREMIUM SYSTEM</div>

</div>

<script>
const main = document.getElementById("main");
const block = document.getElementById("block");
const keyBox = document.getElementById("key");

function checkAccess(){
  const params = new URLSearchParams(location.search);
  const source = params.get("source");
  const ref = document.referrer || "";

  const allowed =
    source === "official" ||
    ref.includes("earnlinks.io") ||
    ref.includes("lootdest.org");

  if(!allowed){
    block.classList.remove("hidden");
    return;
  }

  main.classList.remove("hidden");
  generateKey();
}

function generateKey(){
  keyBox.innerText = "LOADING KEY...";

  setTimeout(()=>{
    fetch("https://api.ipify.org?format=json")
    .then(r=>r.json())
    .then(d=>{

      const ip = d.ip;
      const day = Math.floor(Date.now()/86400000);

      let seed = ip.replace(/\./g,"").slice(0,6) + day;

      function rnd(){
        seed = (seed * 9301 + 49297) % 233280;
        return seed / 233280;
      }

      const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      let key = "PREM-";

      for(let i=0;i<4;i++){
        let seg="";
        for(let j=0;j<4;j++){
          seg += chars[Math.floor(rnd()*chars.length)];
        }
        key += seg + (i<3?"-":"");
      }

      keyBox.innerText = key;
      window.generatedKey = key;

    })
    .catch(()=>{
      keyBox.innerText = "NO INTERNET";
    });

  },600);
}

function copyKey(){
  if(!window.generatedKey) return;

  navigator.clipboard.writeText(window.generatedKey);

  const btn = document.getElementById("copyBtn");
  btn.innerText = "Copied ✔";

  setTimeout(()=>{
    btn.innerText = "Copy Key";
  },1500);
}

window.onload = checkAccess;
</script>

</body>
</html>
