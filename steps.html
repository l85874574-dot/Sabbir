<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Refresh</title>

<meta http-equiv="refresh" content="30">

<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#111;
    color:#fff;
    font-family:Arial,sans-serif;
}
.card{
    text-align:center;
    padding:30px;
    background:#222;
    border-radius:15px;
}
button{
    padding:15px 30px;
    border:none;
    border-radius:10px;
    background:#00cc66;
    color:#fff;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="card">
    <h1>Get Free Key</h1>
    <p>এই পেজটি প্রতি ৩০ সেকেন্ডে অটো রিফ্রেশ হবে।</p>

    <button onclick="go()">Continue</button>
</div>

<script>
function go(){
    location.href="https://example.com";
}
</script>

</body>
</html>
